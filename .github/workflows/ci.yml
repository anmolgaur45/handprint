name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  backend-checks:
    name: Backend (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        working-directory: ./api
        run: uv sync --all-extras
      
      - name: Run Ruff
        working-directory: ./api
        run: uv run ruff check .
        
      - name: Run Mypy
        working-directory: ./api
        run: uv run mypy app --strict
        
      - name: Run Pytest
        working-directory: ./api
        run: uv run pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=85

  frontend-checks:
    name: Frontend (build, tsc, lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'
          
      - name: Install dependencies
        working-directory: ./web
        run: npm ci
        
      - name: Run ESLint
        working-directory: ./web
        run: npm run lint
        
      - name: Run TypeScript compiler
        working-directory: ./web
        run: npx tsc --noEmit
        
      - name: Build Next.js app
        working-directory: ./web
        run: npm run build

      - name: Scan client bundle for secrets
        working-directory: ./web
        run: npm run scan-bundle
